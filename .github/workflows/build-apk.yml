name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.7.12'  # Prueba esta versión fija (2023-era, compatible con repo viejo). Si falla, baja a '3.3.10' o sube a '3.22.x'
        channel: 'stable'

    - name: Clean project
      run: flutter clean

    - name: Remove old lock file
      run: rm -f pubspec.lock  # Borra lock para forzar resolución fresca

    - name: Install dependencies (with verbose)
      run: flutter pub get --verbose

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: build/app/outputs/flutter-apk/app-release.apk
